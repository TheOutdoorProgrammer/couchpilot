<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d1117">
  <title>couchpilot</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>couchpilot</h1>
    <button id="settings-btn" class="icon-btn" aria-label="Settings">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <main>
    <div id="sessions"></div>
    <div id="empty" class="empty-state">
      <div class="empty-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
      </div>
      <p>No sessions yet</p>
      <p class="subtle">Tap below to launch one</p>
    </div>
  </main>

  <button id="new-btn" class="fab">+ New Session</button>

  <div id="new-modal" class="modal">
    <div class="modal-backdrop"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h2>New Session</h2>
      <form id="new-form">
        <div class="field">
          <label for="session-name">Title</label>
          <input type="text" id="session-name" name="name" placeholder="Auto-generated if empty" autocomplete="off">
        </div>
        <div class="field">
          <label>Working Directory</label>
          <div id="dir-chips" class="chips"></div>
          <input type="text" id="session-dir" name="dir" placeholder="~/" autocomplete="off">
        </div>
        <div class="field">
          <label for="perm-mode">Permission Mode</label>
          <select id="perm-mode" name="permissionMode" class="select-field">
            <option value="bypassPermissions">Bypass Permissions</option>
            <option value="auto">Auto</option>
            <option value="dontAsk">Don't Ask</option>
            <option value="acceptEdits">Accept Edits</option>
            <option value="plan">Plan</option>
            <option value="default">Default</option>
          </select>
        </div>
        <div class="field">
          <label for="session-model">Model</label>
          <select id="session-model" name="model" class="select-field">
            <option value="">Default</option>
            <optgroup label="Latest">
              <option value="claude-opus-4-7">Opus 4.7</option>
              <option value="claude-sonnet-4-6">Sonnet 4.6</option>
              <option value="claude-haiku-4-5-20251001">Haiku 4.5</option>
            </optgroup>
            <optgroup label="Previous">
              <option value="claude-opus-4-6">Opus 4.6</option>
              <option value="claude-sonnet-4-5-20250929">Sonnet 4.5</option>
              <option value="claude-opus-4-5-20251101">Opus 4.5</option>
              <option value="claude-opus-4-1-20250805">Opus 4.1</option>
            </optgroup>
            <optgroup label="Aliases">
              <option value="opus">opus</option>
              <option value="sonnet">sonnet</option>
              <option value="haiku">haiku</option>
            </optgroup>
            <option value="__custom__">Custom...</option>
          </select>
          <input type="text" id="session-model-custom" placeholder="Enter model ID..." autocomplete="off" style="display:none;margin-top:8px;">
        </div>
        <div class="field">
          <label for="session-effort">Effort</label>
          <select id="session-effort" name="effort" class="select-field">
            <option value="">Default</option>
            <option value="max">Max</option>
            <option value="xhigh">Extra High</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" data-dismiss="new-modal">Cancel</button>
          <button type="submit" class="btn btn-primary" id="launch-btn">Launch</button>
        </div>
      </form>
    </div>
  </div>

  <div id="settings-modal" class="modal">
    <div class="modal-backdrop"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h2>Settings</h2>
      <div class="field">
        <label>Favorite Directories</label>
        <div id="fav-dirs" class="fav-list"></div>
        <div class="add-row">
          <input type="text" id="new-fav-dir" placeholder="Add directory path...">
          <button type="button" id="add-fav-btn" class="btn btn-small">Add</button>
        </div>
      </div>
      <div class="field">
        <label for="default-perm-mode">Default Permission Mode</label>
        <select id="default-perm-mode" class="select-field">
          <option value="bypassPermissions">Bypass Permissions</option>
          <option value="auto">Auto</option>
          <option value="dontAsk">Don't Ask</option>
          <option value="acceptEdits">Accept Edits</option>
          <option value="plan">Plan</option>
          <option value="default">Default</option>
        </select>
      </div>
      <div class="field">
        <label for="default-model">Default Model</label>
        <select id="default-model" class="select-field">
          <option value="">None</option>
          <optgroup label="Latest">
            <option value="claude-opus-4-7">Opus 4.7</option>
            <option value="claude-sonnet-4-6">Sonnet 4.6</option>
            <option value="claude-haiku-4-5-20251001">Haiku 4.5</option>
          </optgroup>
          <optgroup label="Previous">
            <option value="claude-opus-4-6">Opus 4.6</option>
            <option value="claude-sonnet-4-5-20250929">Sonnet 4.5</option>
            <option value="claude-opus-4-5-20251101">Opus 4.5</option>
            <option value="claude-opus-4-1-20250805">Opus 4.1</option>
          </optgroup>
          <optgroup label="Aliases">
            <option value="opus">opus</option>
            <option value="sonnet">sonnet</option>
            <option value="haiku">haiku</option>
          </optgroup>
          <option value="__custom__">Custom...</option>
        </select>
        <input type="text" id="default-model-custom" placeholder="Enter model ID..." autocomplete="off" style="display:none;margin-top:8px;">
      </div>
      <div class="field">
        <label for="default-effort">Default Effort</label>
        <select id="default-effort" class="select-field">
          <option value="">None</option>
          <option value="max">Max</option>
          <option value="xhigh">Extra High</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" data-dismiss="settings-modal">Close</button>
        <button type="button" id="save-settings" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <div id="confirm-modal" class="modal">
    <div class="modal-backdrop"></div>
    <div class="modal-sheet modal-sm">
      <p id="confirm-msg">Kill this session?</p>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" data-dismiss="confirm-modal">Cancel</button>
        <button type="button" id="confirm-yes" class="btn btn-danger">Kill</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
