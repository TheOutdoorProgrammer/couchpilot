<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d1117">
  <title>couchpilot</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>couchpilot</h1>
    <button id="settings-btn" class="icon-btn" aria-label="Settings">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <main>
    <div id="sessions"></div>
    <div id="empty" class="empty-state">
      <div class="empty-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
      </div>
      <p>No sessions yet</p>
      <p class="subtle">Tap below to launch one</p>
    </div>
  </main>

  <button id="new-btn" class="fab">+ New Session</button>

  <div id="new-modal" class="modal">
    <div class="modal-backdrop"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h2>New Session</h2>
      <form id="new-form">
        <div class="field">
          <label for="session-name">Title</label>
          <input type="text" id="session-name" name="name" placeholder="Auto-generated if empty" autocomplete="off">
        </div>
        <div class="field">
          <label>Working Directory</label>
          <div id="dir-chips" class="chips"></div>
          <input type="text" id="session-dir" name="dir" placeholder="~/" autocomplete="off">
        </div>
        <div class="field toggle-field">
          <span>Skip permissions</span>
          <label class="toggle">
            <input type="checkbox" id="skip-perms" name="skipPerms">
            <span class="toggle-track"></span>
          </label>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" data-dismiss="new-modal">Cancel</button>
          <button type="submit" class="btn btn-primary" id="launch-btn">Launch</button>
        </div>
      </form>
    </div>
  </div>

  <div id="settings-modal" class="modal">
    <div class="modal-backdrop"></div>
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h2>Settings</h2>
      <div class="field">
        <label>Favorite Directories</label>
        <div id="fav-dirs" class="fav-list"></div>
        <div class="add-row">
          <input type="text" id="new-fav-dir" placeholder="Add directory path...">
          <button type="button" id="add-fav-btn" class="btn btn-small">Add</button>
        </div>
      </div>
      <div class="field toggle-field">
        <span>Default skip permissions</span>
        <label class="toggle">
          <input type="checkbox" id="default-skip">
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" data-dismiss="settings-modal">Close</button>
        <button type="button" id="save-settings" class="btn btn-primary">Save</button>
      </div>
    </div>
  </div>

  <div id="confirm-modal" class="modal">
    <div class="modal-backdrop"></div>
    <div class="modal-sheet modal-sm">
      <p id="confirm-msg">Kill this session?</p>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" data-dismiss="confirm-modal">Cancel</button>
        <button type="button" id="confirm-yes" class="btn btn-danger">Kill</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
