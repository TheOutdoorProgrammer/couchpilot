name: test

# Runs on every PR and every push to main. Also exposed via workflow_call so
# the release workflow can invoke it as a gate — a tag push won't ship unless
# this passes (see release.yml).
on:
  pull_request:
  push:
    branches: [main]
  workflow_call:

permissions:
  contents: read

# Cancel superseded runs for the same ref (e.g. rapid PR pushes).
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            echo "Run 'gofmt -w .' and commit."
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (race + coverage)
        run: go test -race -coverprofile=coverage.out ./...
